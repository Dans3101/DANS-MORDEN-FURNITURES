<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Furnish KE | Premium Interiors</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c5a059;
            --brand-pink: #d80056; /* Matching the image color */
            --brand-gradient: linear-gradient(90deg, #d80056 0%, #a20041 100%);
            --bg: #fafafa;
            --text: #333;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- NEW ICON NAVIGATION BAR (TOP) --- */
        .icon-nav {
            background: var(--brand-gradient);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-item {
            color: white;
            text-decoration: none;
            text-align: center;
            flex: 1;
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .nav-item i {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .nav-item:hover {
            transform: scale(1.1);
        }

        /* --- REST OF STYLING --- */
        .hero {
            position: relative;
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80') center/cover;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
        }

        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 5%;
            max-width: 1200px;
            margin: 0 auto 50px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-info {
            padding: 15px;
        }

        .price {
            color: var(--brand-pink);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .btn {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 4px;
        }

        footer {
            background: #111;
            color: #777;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>

<nav class="icon-nav">
    <a href="#" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Search</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fa-solid fa-bag-shopping"></i>
        <span>Shop</span>
    </a>
    <a href="https://wa.me/254713811622" class="nav-item"> <i class="fa-brands fa-whatsapp"></i>
        <span>Whatsapp</span>
    </a>
    <a href="#" class="nav-item">
        <i class="fa-solid fa-bars"></i>
        <span>More</span>
    </a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Elegant Furnish KE</h1>
        <p>Premium Living. Tailored for You.</p>
    </div>
</div>

<h2 class="section-title">Our Collection</h2>
<div id="products" class="products">
    </div>

<footer>
    <p>&copy; 2026 Elegant Furnish KE</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2cXBfvOnLElwRHw0M5cEBX_Ug03fsyxE",
      authDomain: "dans-furnitures.firebaseapp.com",
      projectId: "dans-furnitures",
      storageBucket: "dans-furnitures.firebasestorage.app",
      messagingSenderId: "138747577982",
      appId: "1:138747577982:web:973790879c284de7283a2f",
      measurementId: "G-HB580YD1MM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById("products");

    async function loadProducts() {
        const querySnapshot = await getDocs(collection(db, "products"));
        container.innerHTML = "";

        if (querySnapshot.empty) {
            renderFallback();
        } else {
            querySnapshot.forEach((doc) => renderCard(doc.data()));
        }
    }

    function renderCard(item) {
        container.innerHTML += `
            <div class="card">
                <img src="${item.image || 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500'}" />
                <div class="card-info">
                    <h3>${item.name}</h3>
                    <p class="price">KSh ${Number(item.price).toLocaleString()}</p>
                    <a href="#" class="btn">Order via WhatsApp</a>
                </div>
            </div>
        `;
    }

    function renderFallback() {
        const fallbacks = [
            { name: "Luxury Sofa Set", price: "120000", image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500" },
            { name: "Executive Coffee Table", price: "25000", image: "https://images.unsplash.com/photo-1530018607912-eff2daa1bac4?w=500" }
        ];
        fallbacks.forEach(item => renderCard(item));
    }

    loadProducts();
</script>

</body>
</html>
