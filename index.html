<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Furnish KE</title><style>
body{margin:0;font-family:Arial;background:#f5f5f5}
nav{display:flex;justify-content:space-between;padding:15px;background:#000;color:#fff}
.hero{background:url('https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1200&q=60') center/cover;padding:80px;text-align:center;color:white}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
</style></head><body><nav>
<h2>Elegant Furnish KE</h2>
</nav><div class="hero">
<h1>Modern Furniture</h1>
<p>Quality Furniture for Your Home</p>
</div><h2 style="text-align:center;margin-top:20px">Products</h2>
<div id="products" class="products"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2cXBfvOnLElwRHw0M5cEBX_Ug03fsyxE",
  authDomain: "dans-furnitures.firebaseapp.com",
  projectId: "dans-furnitures",
  storageBucket: "dans-furnitures.firebasestorage.app",
  messagingSenderId: "138747577982",
  appId: "1:138747577982:web:973790879c284de7283a2f",
  measurementId: "G-HB580YD1MM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("products");

async function loadProducts() {
  container.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "products"));

  querySnapshot.forEach((doc) => {
    const item = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${item.image}" />
        <h3>${item.name}</h3>
        <p>KSh ${item.price}</p>
      </div>
    `;
  });
}

loadProducts();
</script></body>
</html>
