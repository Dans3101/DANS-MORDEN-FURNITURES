<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Furnish Kenya</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

nav h1 {
    margin: 0;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
}

.hero {
    text-align: center;
    padding: 60px;
    background: #ddd;
}

.hero h2 {
    font-size: 36px;
}

.btn {
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}
</style>
</head>

<nav>
    <h1>Elegant Furnish KE</h1>

<section class="hero">
    <h2>Quality Furniture in Kenya</h2>
    <p>Modern, affordable, and durable furniture for your home.</p>
    <button class="btn">Shop Now</button>
</section>

<section id="products" class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1582582429416-5b0f0c1b6c2c" alt="">
        <h3>Sofa Set</h3>
        <p>KSh 45,000</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616627451663-cc8f0f9c0c8c" alt="">
        <h3>Dining Table</h3>

    <div class="card">

        <h3>Office Chair</h3>

    </div>

<section id="contact" style="text-align:center; padding:30px;">

    <p>Phone: +254 713 811 622</p>
    <p>Email: musembidaniel615@gmail.com</p>
