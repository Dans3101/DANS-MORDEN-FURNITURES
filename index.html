<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Furnish KE</title><style>
body{margin:0;font-family:Arial;background:#f5f5f5}
nav{display:flex;justify-content:space-between;padding:15px;background:#fff;position:sticky;top:0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.hero{padding:80px;text-align:center;background:#ddd}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
.btn{display:inline-block;padding:8px 12px;background:black;color:#fff;text-decoration:none;margin-top:5px}
.search{margin:20px;text-align:center}
.cart{position:fixed;top:80px;right:10px;background:#fff;padding:10px;border:1px solid #ccc;width:250px}
</style></head>
<body><nav>
<h2>Elegant Furnish KE</h2>
<div>Cart: <span id="cartCount">0</span></div>
</nav><div class="hero">
<h2>Furniture Store</h2>
<p>Order via WhatsApp or Cart</p>
</div><div class="search">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div><section id="products" class="products"></section><div class="cart" id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout (M-Pesa)</button>
</div><script>
const SHEET_ID = "PASTE_YOUR_SHEET_ID_HERE";
const API = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;
let cart = [];

function fixImage(url){
 if(!url) return '';
 if(url.includes('drive.google.com')){
   let id = url.match(/[-\w]{25,}/);
   return `https://drive.google.com/thumbnail?id=${id}`;
 }
 return url;
}

fetch(API)
.then(res=>res.json())
.then(data=>{
 let container=document.getElementById('products');
 data.forEach(item=>{
  container.innerHTML+=`
  <div class="card" data-name="${item.Name}">
    <img src="${fixImage(item.Image)}">
    <h3>${item.Name}</h3>
    <p>KSh ${item.Price}</p>
    <button class="btn" onclick="addToCart('${item.Name}',${item.Price})">Add to Cart</button>
    <a class="btn" href="https://wa.me/254713811622?text=${item.Name}">WhatsApp</a>
  </div>`;
 });
});

function addToCart(name,price){
 cart.push({name,price});
 document.getElementById('cartCount').innerText=cart.length;
 displayCart();
}

function displayCart(){
 let box=document.getElementById('cartItems');
 box.innerHTML='';
 cart.forEach(i=>{
  box.innerHTML+=`<p>${i.name} - KSh ${i.price}</p>`;
 });
}

function checkout(){
 alert('M-Pesa payment: Send money to 0713811622');
}

function searchProduct(){
 let input=document.getElementById('search').value.toLowerCase();
 let cards=document.querySelectorAll('.card');
 cards.forEach(c=>{
  let name=c.getAttribute('data-name').toLowerCase();
  c.style.display=name.includes(input)?'block':'none';
 });
}
</script></body>
</html>
