<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Furnish KE</title><style>
body{margin:0;font-family:Arial;background:#f5f5f5}
nav{display:flex;justify-content:space-between;padding:15px;background:#fff;position:sticky;top:0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.hero{padding:80px;text-align:center;background:#ddd}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover}
.btn{display:inline-block;padding:8px 12px;background:black;color:#fff;text-decoration:none;margin-top:5px}
.search{margin:20px;text-align:center}
.cart{position:fixed;top:80px;right:10px;background:#fff;padding:10px;border:1px solid #ccc;width:250px}
</style></head>
<body><nav>
<h2>Elegant Furnish KE</h2>
<div>Cart: <span id="cartCount">0</span></div>
</nav><div class="hero">
<h2>Furniture Store</h2>
<p>Quality furniture available now</p>
</div><div class="search">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div><section id="products" class="products"><div class="card" data-name="sofa">
<img src="https://images.unsplash.com/photo-1582582429416-5b0f0c1b6c2c">
<h3>Sofa Set</h3>
<p>KSh 45000</p>
<button class="btn" onclick="addToCart('Sofa Set',45000)">Add to Cart</button>
<a class="btn" href="https://wa.me/254713811622?text=I want the Sofa Set">WhatsApp</a>
</div><div class="card" data-name="dining">
<img src="https://images.unsplash.com/photo-1616627451663-cc8f0f9c0c8c">
<h3>Dining Table</h3>
<p>KSh 30000</p>
<button class="btn" onclick="addToCart('Dining Table',30000)">Add to Cart</button>
<a class="btn" href="https://wa.me/254713811622?text=I want the Dining Table">WhatsApp</a>
</div><div class="card" data-name="chair">
<img src="https://images.unsplash.com/photo-1598300053653-9e5f9f8e6f65">
<h3>Office Chair</h3>
<p>KSh 8000</p>
<button class="btn" onclick="addToCart('Office Chair',8000)">Add to Cart</button>
<a class="btn" href="https://wa.me/254713811622?text=I want the Office Chair">WhatsApp</a>
</div></section><div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout (M-Pesa)</button>
</div><script>
let cart=[];

function addToCart(name,price){
 cart.push({name,price});
 document.getElementById('cartCount').innerText=cart.length;
 displayCart();
}

function displayCart(){
 let box=document.getElementById('cartItems');
 box.innerHTML='';
 cart.forEach(i=>{
  box.innerHTML+=`<p>${i.name} - KSh ${i.price}</p>`;
 });
}

function checkout(){
 alert('Pay via M-Pesa to 0713811622');
}

function searchProduct(){
 let input=document.getElementById('search').value.toLowerCase();
 let cards=document.querySelectorAll('.card');
 cards.forEach(c=>{
  let name=c.getAttribute('data-name');
  c.style.display=name.includes(input)?'block':'none';
 });
}
</script></body>
</html>
