<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Furnish KE | Debug Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #1a1a1a; --brand-gradient: linear-gradient(90deg, #d80056 0%, #a20041 100%); --bg: #fafafa; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); }
        .icon-nav { background: var(--brand-gradient); display: flex; justify-content: space-around; padding: 12px 0; position: sticky; top: 0; z-index: 2000; color: white; text-align: center; font-size: 0.7rem; }
        .hero { height: 30vh; display: flex; align-items: center; justify-content: center; color: white; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80') center/cover; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; border: 1px solid #eee; padding: 15px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        #loader { text-align: center; padding: 40px; font-weight: bold; color: #d80056; }
    </style>
</head>
<body>

<nav class="icon-nav">
    <div><i class="fa-solid fa-house"></i><br>Home</div>
    <div><i class="fa-solid fa-magnifying-glass"></i><br>Search</div>
    <div><i class="fa-solid fa-bag-shopping"></i><br>Shop</div>
    <div><i class="fa-brands fa-whatsapp"></i><br>Whatsapp</div>
</nav>

<div class="hero"><h1>Elegant Furnish KE</h1></div>
<div id="loader">Connecting to Database...</div>
<div id="products" class="products"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2cXBfvOnLElwRHw0M5cEBX_Ug03fsyxE",
      authDomain: "dans-furnitures.firebaseapp.com",
      projectId: "dans-furnitures",
      storageBucket: "dans-furnitures.firebasestorage.app",
      messagingSenderId: "138747577982",
      appId: "1:138747577982:web:973790879c284de7283a2f",
      measurementId: "G-HB580YD1MM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadProducts() {
        const loader = document.getElementById("loader");
        const container = document.getElementById("products");

        try {
            // ALERT 1: Checking if connection starts
            console.log("Starting fetch..."); 
            
            const querySnapshot = await getDocs(collection(db, "products"));
            
            if (querySnapshot.empty) {
                // ALERT 2: If collection exists but is empty
                alert("DATABASE LOADED: But found 0 products. Check if your collection name is exactly 'products' (lowercase).");
                loader.innerHTML = "No products found in Firebase.";
                return;
            }

            loader.style.display = "none";
            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const price = item.price ? Number(item.price).toLocaleString() : "0";
                const cleanImg = item.image ? item.image.replace(/['"]+/g, '').trim() : '';

                container.innerHTML += `
                    <div class="card">
                        <img src="${cleanImg}" onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">
                        <h3>${item.name}</h3>
                        <p style="color:#d80056; font-weight:bold">KSh ${price}</p>
                    </div>
                `;
            });

            alert("SUCCESS: Found " + querySnapshot.size + " items!");

        } catch (error) {
            // ALERT 3: If there is a permission or config error
            alert("FIREBASE ERROR: " + error.message);
            loader.innerHTML = "Error: " + error.message;
        }
    }

    loadProducts();
<img src="https://res.cloudinary.com/dd3rguuth/image/upload/v1775316026/image_1400x_5dbf7e46-3635-42c8-b4dd-7dd6d9292aaa_sc8qcp.jpg">
</script>
</body>
</html>
