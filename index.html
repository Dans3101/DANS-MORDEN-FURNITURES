<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Furnish KE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root { --brand: #d80056; --bg: #fafafa; }

body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); }

.icon-nav {
    background: linear-gradient(90deg,#d80056,#a20041);
    display:flex; justify-content:space-around;
    padding:12px 0; color:white;
    position:sticky; top:0; z-index:1000;
    font-size:0.7rem; text-align:center;
}

.hero {
    height:30vh; display:flex;
    align-items:center; justify-content:center;
    color:white;
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1524758631624-e2822e304c36') center/cover;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:6px;
}

button {
    cursor:pointer;
}

.cart-btn {
    background:black; color:white;
    padding:10px; width:100%;
    border:none; border-radius:5px;
    margin-bottom:8px;
}

.whatsapp-btn {
    background:#25D366; color:white;
    padding:10px; width:100%;
    border:none; border-radius:5px;
}

.top-bar {
    text-align:center;
    padding:10px;
}

</style>
</head>

<body>

<nav class="icon-nav">
    <div><i class="fa-solid fa-house"></i><br>Home</div>
    <div><i class="fa-solid fa-magnifying-glass"></i><br>Search</div>
    <div><i class="fa-solid fa-bag-shopping"></i><br>Shop</div>
    <div><i class="fa-brands fa-whatsapp"></i><br>WhatsApp</div>
</nav>

<div class="hero"><h1>Elegant Furnish KE</h1></div>

<div class="top-bar">
    <button onclick="viewCart()" style="padding:10px 20px; background:#d80056; color:white; border:none; border-radius:5px;">
        View Cart 🛒
    </button>
</div>

<div id="products" class="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2cXBfvOnLElwRHw0M5cEBX_Ug03fsyxE",
  authDomain: "dans-furnitures.firebaseapp.com",
  projectId: "dans-furnitures",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const phoneNumber = "254713811622";

let cart = [];

async function loadProducts() {
    const container = document.getElementById("products");
    container.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "products"));

        if (querySnapshot.empty) {
            container.innerHTML = "<p style='text-align:center;'>No products found</p>";
            return;
        }

        querySnapshot.forEach((doc) => {
            const item = doc.data();

            const price = Number(item.price).toLocaleString();

            const message = `Hello I am interested in ${item.name} priced at KSh ${price}`;
            const whatsappLink = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

            const card = `
                <div class="card">
                    <img src="${item.image}" onerror="this.src='https://via.placeholder.com/300'">
                    <h3>${item.name}</h3>
                    <p style="color:#d80056; font-weight:bold">KSh ${price}</p>

                    <button class="cart-btn" onclick="addToCart('${item.name}', ${item.price})">
                        Add to Cart
                    </button>

                    <a href="${whatsappLink}" target="_blank">
                        <button class="whatsapp-btn">
                            Order on WhatsApp
                        </button>
                    </a>
                </div>
            `;

            container.innerHTML += card;
        });

    } catch (error) {
        console.error(error);
        document.getElementById("products").innerHTML =
            "<p style='text-align:center;color:red;'>Error loading products</p>";
    }
}

// CART FUNCTIONS
window.addToCart = function(name, price) {
    cart.push({ name, price });
    alert(name + " added to cart 🛒");
};

window.viewCart = function() {
    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    let message = "Hello, I want to order:%0A";

    cart.forEach(item => {
        message += `- ${item.name} (KSh ${item.price})%0A`;
    });

    const whatsappLink = `https://wa.me/${phoneNumber}?text=${message}`;
    window.open(whatsappLink, "_blank");
};

loadProducts();
</script>

</body>
</html>
