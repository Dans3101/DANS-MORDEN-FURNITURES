<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Furnish KE | Premium Interiors</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c5a059;
            --brand-pink: #d80056; 
            --brand-gradient: linear-gradient(90deg, #d80056 0%, #a20041 100%);
            --whatsapp-green: #25D366;
            --bg: #fafafa;
            --text: #333;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- ICON NAVIGATION BAR (TOP) --- */
        .icon-nav {
            background: var(--brand-gradient);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .nav-item {
            color: white;
            text-decoration: none;
            text-align: center;
            flex: 1;
            font-size: 0.7rem;
            font-weight: 600;
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .nav-item i {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80') center/cover;
        }

        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; }

        /* --- PRODUCT GRID --- */
        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 5%;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #f0f0f0; /* Gray placeholder while loading */
        }

        .card-info { padding: 20px; flex-grow: 1; }

        .price {
            color: var(--brand-pink);
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* --- LOADING SPINNER --- */
        #loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--brand-pink);
        }

        footer {
            background: #111;
            color: #888;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

<nav class="icon-nav">
    <a href="#" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bag-shopping"></i><span>Shop</span></a>
    <a href="https://wa.me/254700000000" target="_blank" class="nav-item"><i class="fa-brands fa-whatsapp"></i><span>Whatsapp</span></a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bars"></i><span>More</span></a>
</nav>

<div class="hero">
    <h1>Elegant Furnish KE</h1>
</div>

<h2 class="section-title">Our Collection</h2>

<div id="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Exquisite Pieces...</div>
<div id="products" class="products"></div>

<footer>
    <p>&copy; 2026 Elegant Furnish KE | Nairobi, Kenya</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2cXBfvOnLElwRHw0M5cEBX_Ug03fsyxE",
      authDomain: "dans-furnitures.firebaseapp.com",
      projectId: "dans-furnitures",
      storageBucket: "dans-furnitures.firebasestorage.app",
      messagingSenderId: "138747577982",
      appId: "1:138747577982:web:973790879c284de7283a2f",
      measurementId: "G-HB580YD1MM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById("products");
    const loader = document.getElementById("loader");

    // Replace with your actual WhatsApp number
    const PHONE_NUMBER = "254700000000"; 

    async function loadProducts() {
        try {
            const querySnapshot = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            loader.style.display = "none"; // Hide loader when data arrives

            if (querySnapshot.empty) {
                showPlaceholder();
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // DATA CLEANER: Removes quotes, spaces, or line breaks from your Firebase URL
                let imageUrl = data.image ? data.image.replace(/['"]+/g, '').trim() : '';
                
                const price = Number(data.price).toLocaleString();
                const waMessage = encodeURIComponent(`Hello! I'd like to order:\n*Item:* ${data.name}\n*Price:* KSh ${price}`);
                const waLink = `https://wa.me/${PHONE_NUMBER}?text=${waMessage}`;

                container.innerHTML += `
                    <div class="card">
                        <img src="${imageUrl}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/500?text=Image+Not+Found'">
                        <div class="card-info">
                            <h3>${data.name}</h3>
                            <p class="price">KSh ${price}</p>
                            <a href="${waLink}" target="_blank" class="btn-whatsapp">
                                <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                            </a>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            console.error(err);
            loader.innerHTML = "Error loading products. Please check database connection.";
        }
    }

    function showPlaceholder() {
        container.innerHTML = `<p style="text-align:center; grid-column: 1/-1;">No products found in database.</p>`;
    }

    loadProducts();
</script>
</body>
</html>
